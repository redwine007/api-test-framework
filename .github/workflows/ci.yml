name: API Test CI

# 触发条件：
# 1) push 到 master 分支时触发
# 2) 提 PR 到 master 分支时触发
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 第一步：拉取仓库代码到 runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 第二步：安装 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 第三步：安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # 第四步：运行测试
      - name: Run tests
        run: |
          python -m pytest -q